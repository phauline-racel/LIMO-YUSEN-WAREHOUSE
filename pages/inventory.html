<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inventory — Yusen Warehouse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand"><img src="../assets/logo-YL.png" alt="Yusen Logistics" class="brand-logo"/></div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <span class="toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
            </svg>
          </span>
        </button>
      </div>
      <nav>
        <a href="dashboard.html" title="Dashboard"><span class="icon"><i class="bi bi-house-door-fill"></i></span><span class="text">Dashboard</span></a>
        <a href="inbound-outbound.html" title="Inbound & Outbound"><span class="icon"><i class="bi bi-box-seam-fill"></i></span><span class="text">Inbound & Outbound</span></a>
        <a href="inventory.html" title="Inventory"><span class="icon"><span class="material-symbols-outlined">task</span></span><span class="text">Inventory</span></a>
        <a href="activity-report.html" title="Activity Report"><span class="icon"><span class="material-symbols-outlined">monitoring</span></span><span class="text">Activity Report</span></a>
        <a href="profile.html" title="Profile"><span class="icon"><i class="bi bi-person-fill"></i></span><span class="text">Profile</span></a>
        <a href="#logout" title="Logout"><span class="icon"><i class="bi bi-box-arrow-right"></i></span><span class="text">Logout</span></a>
      </nav>
    </aside>
    <div class="main-column">
      <header class="topbar">
        <div class="search-container">
          <span class="search-icon">🔍︎</span>
          <input type="text" placeholder="Search HAWB, MAWB, Client..." class="search-input"/>
        </div>
        <div class="top-actions">
          <button class="icon notification-btn"><i class="bi bi-bell-fill"></i><span class="badge">1</span></button>
          <div class="user-profile">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Joseph" alt="User" class="user-avatar"/>
            <div class="user-info">
              <div class="user-name">JOSEPH</div>
              <div class="user-role">Warehouse Staff</div>
            </div>
            <span class="dropdown-icon">▾</span>
          </div>
        </div>
      </header>
      <div class="content">
        <h1>Inventory</h1>
        <div class="filters">Filters: <input placeholder="Client"/> <select><option>All</option></select></div>

        <div class="table">
          <table>
            <thead><tr><th>Client</th><th>HAWB</th><th>MAWB</th><th>Transaction Type</th><th>Warehouse Location</th><th>Remaining Quantity</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>
              <tr><td>ABC Corp</td><td>HAWB001</td><td>MAWB001</td><td>Import</td><td>WH-A</td><td>10 CTN</td><td>Stored</td><td><a href="shipment-details.html">View</a></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/app.js"></script>
</body>
</html>
