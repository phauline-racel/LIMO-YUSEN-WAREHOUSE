<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inventory — Yusen Warehouse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand"><img src="../assets/logo-YL.png" alt="Yusen Logistics" class="brand-logo"/></div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <span class="toggle-icon" aria-hidden="true">
            <i class="bi bi-list"></i>
          </span>
        </button>
      </div>
      <nav>
        <a href="dashboard.html" title="Dashboard"><span class="icon"><i class="bi bi-house-door-fill"></i></span><span class="text">Dashboard</span></a>
        <a href="inbound-outbound.html" title="Inbound & Outbound"><span class="icon"><i class="bi bi-box-seam-fill"></i></span><span class="text">Inbound & Outbound</span></a>
        <a href="inventory.html" title="Inventory"><span class="icon"><span class="material-symbols-outlined">task</span></span><span class="text">Inventory</span></a>
        <a href="activity-report.html" title="Activity Report"><span class="icon"><span class="material-symbols-outlined">monitoring</span></span><span class="text">Activity Report</span></a>
      </nav>
    </aside>
    <div class="main-column">
      <header class="topbar">
        <div class="topbar-brand">Amvel Warehouse</div>
        <div class="search-container">
          <span class="search-icon">🔍︎</span>
          <input type="text" placeholder="Search HAWB, MAWB, Client..." class="search-input"/>
        </div>
        <div class="top-actions">
          <button class="icon notification-btn"><i class="bi bi-bell-fill"></i><span class="badge">1</span></button>
          <div class="user-profile-container">
            <button class="user-profile" id="userProfileBtn" type="button">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Joseph" alt="User" class="user-avatar"/>
              <div class="user-info">
                <div class="user-name">JOSEPH</div>
                <div class="user-role">Warehouse Staff</div>
              </div>
              <span class="dropdown-icon">▾</span>
            </button>
            <div class="user-dropdown" id="userDropdown">
              <a href="profile.html" class="dropdown-item">👤 Profile</a>
              <a href="#logout" class="dropdown-item logout-link">🚪 Logout</a>
            </div>
          </div>
        </div>
      </header>
      <div class="content">
        <h1>Inventory</h1>

        <div class="inventory-toolbar">
          <div class="inventory-controls">
            <div class="search-container inventory-search-box">
              <span class="search-icon">🔍︎</span>
              <input type="text" placeholder="Search by MAWB or HAWB" class="search-input"/>
            </div>

            <button class="inventory-filter-toggle" id="inventoryFilterToggle" type="button" aria-expanded="false" aria-controls="inventoryFilterPanel">
              <span class="material-symbols-outlined">filter_alt</span>
              <span>Filters</span>
            </button>

            <div class="inventory-filter-panel" id="inventoryFilterPanel" aria-hidden="true">
              <div class="filter-box">
                <label for="inventory-location">Location</label>
                <select id="inventory-location" aria-label="Location">
                  <option selected disabled>Select location</option>
                  <option>Aisle A</option>
                  <option>Aisle B</option>
                </select>
              </div>
              <div class="filter-box">
                <label for="inventory-transaction">Transaction Type</label>
                <select id="inventory-transaction" aria-label="Transaction Type">
                  <option selected disabled>Select type</option>
                  <option>AFF Import</option>
                  <option>AFF Export</option>
                  <option>OFF Import</option>
                  <option>OFF Export</option>
                </select>
              </div>
              <div class="filter-box">
                <label for="inventory-status">Status</label>
                <select id="inventory-status" aria-label="Status">
                  <option selected disabled>Select status</option>
                  <option>Return</option>
                  <option>Hold</option>
                  <option>Waiting for Confirmation</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="table">
          <table>
            <thead>
              <tr>
                <th>Client</th>
                <th>HAWB</th>
                <th>MAWB</th>
                <th>Transaction Type</th>
                <th>Location</th>
                <th>Remaining Quantity</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="inventoryTableBody"></tbody>
          </table>
          <div class="pagination-wrapper">
            <div class="pagination-boxes" id="inventoryPagination" aria-label="Inventory pagination"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/app.js"></script>
</body>
</html>
