<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Management — Yusen Warehouse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand"><img src="../assets/logo-YL.png" alt="Yusen Logistics" class="brand-logo"/></div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <span class="toggle-icon" aria-hidden="true">
            <i class="bi bi-list"></i>
          </span>
        </button>
      </div>
      <nav>
        <a href="dashboard.html" title="Dashboard"><span class="icon"><i class="bi bi-house-door-fill"></i></span><span class="text">Dashboard</span></a>
        <a href="inbound-outbound.html" title="Inbound & Outbound"><span class="icon"><i class="bi bi-box-seam-fill"></i></span><span class="text">Inbound & Outbound</span></a>
        <a href="inventory.html" title="Inventory"><span class="icon"><span class="material-symbols-outlined">task</span></span><span class="text">Inventory</span></a>
        <a href="activity-report.html" title="Activity Report"><span class="icon"><span class="material-symbols-outlined">monitoring</span></span><span class="text">Activity Report</span></a>
      </nav>
    </aside>
    <div class="main-column">
      <header class="topbar">
        <div class="topbar-brand">Amvel Warehouse</div>
        <div class="search-container">
          <span class="search-icon">🔍︎</span>
          <input type="text" placeholder="Search HAWB, MAWB, Client..." class="search-input"/>
        </div>
        <div class="top-actions">
          <button class="icon notification-btn" type="button"><i class="bi bi-bell-fill"></i><span class="badge">1</span></button>
          <div class="user-profile-container">
            <button class="user-profile" id="userProfileBtn" type="button">
              <div class="user-avatar" aria-hidden="true"></div>
              <div class="user-info">
                <div class="user-name">JUAN CRUZ</div>
                <div class="user-role">Administrator</div>
              </div>
              <span class="dropdown-icon">▾</span>
            </button>
            <div class="user-dropdown" id="userDropdown">
              <a href="profile.html" class="dropdown-item"><i class="bi bi-person-fill"></i> Profile</a>
              <a href="user-management.html" class="dropdown-item admin-only-nav"><i class="bi bi-people-fill"></i> User Management</a>
              <a href="#logout" class="dropdown-item logout-link"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </div>
          </div>
        </div>
      </header>
      <div class="content">
        <div class="page-header">
          <h1>User Management</h1>
        </div>
        
        <div class="user-management-card">
          <!-- Toolbar -->
          <div class="user-toolbar">
            <div class="toolbar-left">
              <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="userSearchInput" placeholder="Search by Employee ID, Name or Username" />
              </div>
              <select id="userRoleFilter" class="role-filter">
                <option value="all">All Roles</option>
                <option value="admin">Admin</option>
                <option value="employee">Employee</option>
              </select>
            </div>
            <div class="toolbar-right">
              <button class="btn-add-user" id="addUserBtn" type="button">
                <i class="bi bi-plus"></i> Add User
              </button>
            </div>
          </div>

          <!-- Table Container -->
          <div class="table-container">
            <table class="user-table">
              <thead>
                <tr>
                  <th>Employee ID</th>
                  <th style="text-align: left;">Full Name</th>
                  <th>Username</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Last Login</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="userManagementTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/auth.js"></script>
  <script src="../assets/app.js"></script>
</body>
</html>
