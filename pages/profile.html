<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile — Yusen Warehouse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand"><img src="../assets/logo-YL.png" alt="Yusen Logistics" class="brand-logo"/></div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <span class="toggle-icon" aria-hidden="true">
            <i class="bi bi-list"></i>
          </span>
        </button>
      </div>
      <nav>
        <a href="dashboard.html" title="Dashboard"><span class="icon">📊</span><span class="text">Dashboard</span></a>
        <a href="inbound-outbound.html" title="Inbound & Outbound"><span class="icon">📦</span><span class="text">Inbound & Outbound</span></a>
        <a href="inventory.html" title="Inventory"><span class="icon">📋</span><span class="text">Inventory</span></a>
        <a href="activity-report.html" title="Activity Report"><span class="icon">📈</span><span class="text">Activity Report</span></a>
        <a href="profile.html" title="Profile"><span class="icon">👤</span><span class="text">Profile</span></a>
        <a href="#logout" title="Logout"><span class="icon">🚪</span><span class="text">Logout</span></a>
      </nav>
    </aside>
    <div class="main-column">
      <header class="topbar">
        <div class="search-container">
          <span class="search-icon">🔍︎</span>
          <input type="text" placeholder="Search HAWB, MAWB, Client..." class="search-input"/>
        </div>
        <div class="top-actions">
          <button class="icon notification-btn">🔔<span class="badge">1</span></button>
          <div class="user-profile-container">
            <button class="user-profile" id="userProfileBtn">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Joseph" alt="User" class="user-avatar"/>
              <div class="user-info">
                <div class="user-name">JOSEPH</div>
                <div class="user-role">Warehouse Staff</div>
              </div>
              <span class="dropdown-icon">▾</span>
            </button>
            <div class="user-dropdown" id="userDropdown">
              <a href="profile.html" class="dropdown-item">👤 Profile</a>
              <a href="#logout" class="dropdown-item logout-link">🚪 Logout</a>
            </div>
          </div>
        </div>
      </header>
      <div class="content">
        <h1>Profile</h1>
        <div class="card-row">
          <div class="card">
            <div style="display:flex;gap:12px;align-items:center">
              <div style="width:72px;height:72px;background:#ddd;border-radius:50%"></div>
              <div>
                <div><strong>Juan Dela Cruz</strong></div>
                <div>ID: EMP-001</div>
                <div>Position: Warehouse Staff</div>
              </div>
            </div>
            <div style="margin-top:12px"><button class="btn">Edit Profile</button> <button class="btn">Change Password</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/app.js"></script>
</body>
</html>
