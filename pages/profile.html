<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile — Yusen Warehouse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand"><img src="../assets/logo-YL.png" alt="Yusen Logistics" class="brand-logo"/></div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <span class="toggle-icon" aria-hidden="true">
            <i class="bi bi-list"></i>
          </span>
        </button>
      </div>
      <nav>
        <a href="dashboard.html" title="Dashboard"><span class="icon"><i class="bi bi-house-door-fill"></i></span><span class="text">Dashboard</span></a>
        <a href="inbound-outbound.html" title="Inbound & Outbound"><span class="icon"><i class="bi bi-box-seam-fill"></i></span><span class="text">Inbound & Outbound</span></a>
        <a href="inventory.html" title="Inventory"><span class="icon"><span class="material-symbols-outlined">task</span></span><span class="text">Inventory</span></a>
        <a href="activity-report.html" title="Activity Report"><span class="icon"><span class="material-symbols-outlined">monitoring</span></span><span class="text">Activity Report</span></a>
      </nav>
    </aside>
    <div class="main-column">
      <header class="topbar">
        <div class="topbar-brand">Amvel Warehouse</div>
        <div class="search-container">
          <span class="search-icon">🔍︎</span>
          <input type="text" placeholder="Search HAWB, MAWB, Client..." class="search-input"/>
        </div>
        <div class="top-actions">
          <button class="icon notification-btn" type="button"><i class="bi bi-bell-fill"></i><span class="badge">1</span></button>
          <div class="user-profile-container">
            <button class="user-profile" id="userProfileBtn" type="button">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Joseph" alt="User" class="user-avatar"/>
              <div class="user-info">
                <div class="user-name">JUAN CRUZ</div>
                <div class="user-role">Administrator</div>
              </div>
              <span class="dropdown-icon">▾</span>
            </button>
            <div class="user-dropdown" id="userDropdown">
              <a href="profile.html" class="dropdown-item"><i class="bi bi-person-fill"></i> Profile</a>
              <a href="user-management.html" class="dropdown-item admin-only-nav"><i class="bi bi-people-fill"></i> User Management</a>
              <a href="#logout" class="dropdown-item logout-link"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </div>
          </div>
        </div>
      </header>
      <div class="content">
        <div class="page-header">
          <h1>Profile</h1>
        </div>
        <div class="card-row">
          <div class="card">
            <div style="display:flex;gap:12px;align-items:center">
              <div id="profileAvatar" style="width:72px;height:72px;background:#06183d;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700">J</div>
              <div>
                <div><strong id="profileDisplayName">Juan Cruz</strong></div>
                <div id="profileEmployeeId">ID: ADM-001</div>
                <div id="profilePosition">Position: Administrator</div>
              </div>
            </div>
            <div style="margin-top:12px">
              <button class="btn" id="profileEditBtn" type="button">Edit Profile</button>
              <button class="btn" id="changePasswordBtn" type="button">Change Password</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/auth.js"></script>
  <script src="../assets/app.js"></script>
</body>
</html>
