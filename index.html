<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amvel Warehouse Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="brand-panel">
        <div class="brand-card">
          <img src="assets/logo.svg" alt="Yusen Logistics Philippines Inc logo" class="logo" />
          <div>
            <p class="eyebrow">Yusen Logistics Philippines Inc</p>
            <h1>Amvel Warehouse</h1>
          </div>
        </div>
      </div>

      <div class="login-panel">
        <form class="login-card" autocomplete="on">
          <div class="login-header">
            <h2>Ready to work?</h2>
            <p>Sign in to access your warehouse dashboard</p>
          </div>

          <label class="field">
            <span>Username</span>
            <input type="text" name="username" placeholder="Enter username" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" name="password" placeholder="Enter password" required />
          </label>

          <button type="submit">Login</button>
        </form>
      </div>
    </div>
  </body>
</html>
